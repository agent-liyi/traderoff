# 动态平衡播客 — nginx 反向代理配置
# 放到 /etc/nginx/sites-available/dongtaipingheng
# 然后 ln -s /etc/nginx/sites-available/dongtaipingheng /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name dongtaipingheng.com www.dongtaipingheng.com;

    # 强制 HTTPS（配置 SSL 证书后启用）
    # return 301 https://$host$request_uri;
}

# SSL 配置（申请 Let's Encrypt 证书后使用）
# server {
#     listen 443 ssl http2;
#     server_name dongtaipingheng.com www.dongtaipingheng.com;
#
#     ssl_certificate     /etc/letsencrypt/live/dongtaipingheng.com/fullchain.pem;
#     ssl_certificate_key /etc/letsencrypt/live/dongtaipingheng.com/privkey.pem;
#     ssl_protocols       TLSv1.2 TLSv1.3;
#     ssl_ciphers         HIGH:!aNULL:!MD5;

    # 上传文件大小限制（base64 编码约膨胀 33%，留足余量）
    client_max_body_size 200m;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;
    gzip_comp_level 5;

    # 安全头
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # 静态资源缓存
    location /_next/static {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
